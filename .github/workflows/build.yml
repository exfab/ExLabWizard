# PyInstaller multi-OS build matrix. Backend Spec §15.1.
#
# Runs on every push to a branch that touches the build inputs (the spec
# file, the workflow itself, ``pyproject.toml``, or any package source)
# and on every release tag. The four matrix targets line up 1:1 with the
# four artifact rows in the §15.1 table:
#
# | OS        | Runner          | Artifact suffix              |
# |-----------|-----------------|------------------------------|
# | Windows   | windows-latest  | win-x64                      |
# | macOS x64 | macos-13        | mac-x64                      |
# | macOS arm | macos-14        | mac-arm64                    |
# | Linux x64 | ubuntu-latest   | linux-x64                    |
#
# v1 ships unsigned (Backend Spec §15.2); signing/notarization is a v1.1
# follow-up. The smoke step here is structural -- it boots the tray
# binary, hits ``/api/v1/health``, and tears it down.

name: build

on:
  push:
    branches: ["**"]
    paths:
      - "exlab_wizard.spec"
      - ".github/workflows/build.yml"
      - "pyproject.toml"
      - "exlab_wizard/**"
      - "_internal/**"
      - "scripts/build_local.*"
  pull_request:
    branches: ["main"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            artifact_suffix: linux-x64
            tray_exe: ExLab-Wizard/ExLab-Wizard-Tray
          - os: windows-latest
            label: win-x64
            artifact_suffix: win-x64
            tray_exe: ExLab-Wizard/ExLab-Wizard-Tray.exe
          - os: macos-13
            label: mac-x64
            artifact_suffix: mac-x64
            tray_exe: ExLab-Wizard.app/Contents/MacOS/ExLab-Wizard-Tray
          - os: macos-14
            label: mac-arm64
            artifact_suffix: mac-arm64
            tray_exe: ExLab-Wizard.app/Contents/MacOS/ExLab-Wizard-Tray
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build + test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build,test]

      - name: Run PyInstaller
        run: pyinstaller exlab_wizard.spec
        env:
          PYTHONHASHSEED: "0"

      - name: Smoke test (boot tray, hit health, kill)
        shell: bash
        run: |
          set -euo pipefail
          tray="dist/${{ matrix.tray_exe }}"
          if [ ! -x "$tray" ]; then
            echo "tray binary not found at $tray" >&2
            ls -R dist/ >&2
            exit 1
          fi
          # Boot the tray in the background; redirect logs to a file so
          # we can surface them on failure. The tray writes its
          # ``server.json`` handshake to its OS-default state dir; we
          # poll ``/api/v1/health`` against the published port.
          "$tray" --no-autostart-prompt > tray.log 2>&1 &
          tray_pid=$!
          # Wait up to 30s for ``server.json`` to appear, then read the
          # port. State-dir resolution lives in ``exlab_wizard.paths``.
          state_dir=$(python -c "from exlab_wizard.paths import ensure_state_dir; print(ensure_state_dir())")
          for _ in $(seq 1 30); do
            if [ -f "$state_dir/server.json" ]; then
              break
            fi
            sleep 1
          done
          if [ ! -f "$state_dir/server.json" ]; then
            echo "server.json never appeared; tray log:" >&2
            cat tray.log >&2 || true
            kill $tray_pid 2>/dev/null || true
            exit 1
          fi
          port=$(python -c "import json,sys; print(json.load(open('$state_dir/server.json'))['port'])")
          # Hit the health endpoint with a short timeout; succeed only
          # on HTTP 200.
          status=$(curl -fsS -o health.json -w "%{http_code}" "http://127.0.0.1:$port/api/v1/health" || echo "000")
          echo "health status: $status"
          cat health.json || true
          # Always tear down the tray so the runner shuts down cleanly.
          kill $tray_pid 2>/dev/null || true
          wait $tray_pid 2>/dev/null || true
          test "$status" = "200"

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          version=$(python -c "from exlab_wizard import __version__; print(__version__)")
          out_name="ExLab-Wizard-${version}-${{ matrix.artifact_suffix }}"
          case "${{ matrix.os }}" in
            windows-latest)
              cd dist
              7z a -tzip "../${out_name}.zip" "ExLab-Wizard"
              cd ..
              ;;
            macos-*)
              # v1 ships an unsigned ``.app`` directory inside a tar;
              # a real ``.dmg`` is a v1.1 follow-up (Backend Spec §15.2).
              cd dist
              tar -czf "../${out_name}.tar.gz" "ExLab-Wizard.app"
              cd ..
              ;;
            ubuntu-latest)
              cd dist
              tar -czf "../${out_name}.tar.gz" "ExLab-Wizard"
              cd ..
              ;;
          esac
          ls -lh ExLab-Wizard-* || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exlab-wizard-${{ matrix.artifact_suffix }}
          path: |
            ExLab-Wizard-*.zip
            ExLab-Wizard-*.tar.gz
          if-no-files-found: error
          retention-days: 30
