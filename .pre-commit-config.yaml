# Pre-commit configuration for ExLab-Wizard (Phase 1B).
#
# Hook responsibilities:
#   1. Upstream `ruff` + `ruff-format` -- general lint and formatting.
#   2. Upstream `mypy` -- static type checking against the [tool.mypy] config in pyproject.toml.
#   3. Local `no-direct-getLogger` -- enforces Backend §16.10 (only logging/manager.py may call logging.getLogger).
#   4. Local `no-direct-ui-notify`  -- enforces Frontend §2.2 (only ui/notifications.py may call ui.notify).
#   5. Local `no-em-dash` and `no-en-dash-in-source` -- enforces the DESIGN.md absolute constraint.
#
# Run locally with:  pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        # Mypy needs the project deps available to resolve imports; we run it against the
        # package source only (tests are typed loosely). Additional stubs go in additional_dependencies.
        files: ^src/exlab_wizard/
        additional_dependencies:
          - "pydantic>=2.6"

  - repo: local
    hooks:
      - id: no-direct-getLogger
        name: Forbid direct logging.getLogger outside logging/manager.py
        entry: 'logging\.getLogger\('
        language: pygrep
        types: [python]
        exclude: '^src/exlab_wizard/logging/manager\.py$'

      - id: no-direct-ui-notify
        name: Forbid direct ui.notify outside ui/notifications.py
        entry: '\bui\.notify\('
        language: pygrep
        types: [python]
        exclude: '^src/exlab_wizard/ui/notifications\.py$'

      - id: no-em-dash
        name: Forbid em dashes (DESIGN.md absolute constraint)
        entry: "—"
        language: pygrep
        types_or: [python, markdown, yaml, toml]
        # The pre-commit config itself contains the literal em dash as the search pattern;
        # exclude it so the hook does not flag its own definition.
        exclude: '^\.pre-commit-config\.yaml$'

      - id: no-en-dash-in-source
        name: Forbid en dashes in Python source (use -- or restructure)
        entry: "–"
        language: pygrep
        types: [python]
        exclude: '^\.pre-commit-config\.yaml$'
